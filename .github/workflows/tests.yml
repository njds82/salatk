name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-dom-sw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run DOM tests
        run: npm run test:dom

      - name: Run service worker tests
        run: npm run test:sw

      - name: Run coverage report
        run: npm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local stack
        run: npm run supabase:start

      - name: Reset local database
        run: npm run supabase:reset

      - name: Run integration tests against local Supabase
        run: |
          npx supabase status -o env > supabase.env
          set -a
          source supabase.env
          set +a
          export SUPABASE_URL="$API_URL"
          export SUPABASE_ANON_KEY="$ANON_KEY"
          npm run test:integration

      - name: Stop Supabase local stack
        if: always()
        run: npm run supabase:stop

  e2e:
    runs-on: ubuntu-latest
    needs: [unit-dom-sw]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
